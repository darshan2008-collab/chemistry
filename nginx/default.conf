server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 20m;

    location /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # Auth routes are defined with /api prefix in backend.
    location ^~ /api/auth/ {
        proxy_pass http://chemtest-api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Most other backend routes are defined without /api prefix.
    location /api/ {
        proxy_pass http://chemtest-api:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        alias /data/uploads/;
        autoindex off;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # Serve splash directly at root to avoid absolute redirect host/port issues.
    location = / {
        try_files /splash.html =404;
    }

    # PPT portal is disabled: serve staff login for old PPT URLs.
    location = /ppt-login.html {
        try_files /staff-login.html =404;
    }

    location = /ppt-dashboard.html {
        try_files /staff-login.html =404;
    }

    location = /ppt-login.js {
        return 404;
    }

    location = /ppt-dashboard.js {
        return 404;
    }

    # Prevent stale splash/login/PPT portal assets from being cached in production.
    location ~* ^/(login|splash|ppt-login|ppt-dashboard)\.(html|js|css)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /login.html;
    }
}
