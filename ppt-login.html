<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PPT Portal Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="ppt-login.css" />
</head>
<body>
  <div class="bg-shape bg-shape-a"></div>
  <div class="bg-shape bg-shape-b"></div>

  <main class="login-shell">
    <section class="login-card">
      <h1>PPT Portal Login</h1>
      <p class="sub">Sign in to view student PPT uploads subject-wise.</p>

      <form id="pptLoginForm" novalidate>
        <label for="email">Username or Email</label>
        <input id="email" type="text" placeholder="Enter your staff username" autocomplete="username" required />

        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Enter password" autocomplete="current-password" required />

        <button id="loginBtn" type="submit">Sign In to PPT Portal</button>
        <p id="errorMsg" class="error" role="alert" aria-live="polite"></p>
      </form>

      <div class="actions">
        <a href="staff-login.html">Back to Staff Login</a>
      </div>
    </section>
  </main>

  <script src="ppt-login.js"></script>
</body>
</html>
