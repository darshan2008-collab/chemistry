<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grade Submission – Unitest Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="staff-dashboard.css" />
  <link rel="stylesheet" href="grade.css" />
</head>
<body>
  <div class="bg-layer">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <div class="main-wrap" style="margin-left: 0;">
    <header class="topbar" style="justify-content: center;">
      <button class="back-btn" id="backBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Back to Dashboard
      </button>
      <div class="topbar-title" style="text-align: center; flex: 1;">📝 Grade Submission</div>
      <div style="width: 140px;"></div> <!-- Spacer -->
    </header>

    <main class="main-content" style="max-width: 1200px; margin: 0 auto; display: flex; gap: 30px; align-items: flex-start; flex-wrap: wrap;">
      
      <!-- Photos Column -->
      <div class="photos-panel">
        <div class="glass-card" style="padding: 20px;">
          <h3>Answer Sheet Photos</h3>
          <p id="photoCount" style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 20px;"></p>
          <div class="images-grid" id="imagesGrid"></div>
        </div>
      </div>

      <!-- Grading Column -->
      <div class="grading-panel">
        <div class="glass-card" style="padding: 28px;">
          <h3 style="margin-bottom: 20px;">Student Information</h3>
          <div class="modal-info-grid" id="infoGrid" style="padding: 0; margin-bottom: 30px;">
            <!-- Info injected here -->
          </div>

          <h3 style="margin-bottom: 20px;">Evaluation</h3>
          <div class="grade-form" style="padding: 0;">
            <div class="grade-row" style="margin-bottom: 16px;">
              <div class="form-group">
                <label for="marksInput">Marks Obtained <span class="req">*</span></label>
                <input type="text" id="marksInput" placeholder="e.g. 85" />
              </div>
              <div class="form-group">
                <label for="totalMarksInput">Total Marks <span class="req">*</span></label>
                <input type="text" id="totalMarksInput" placeholder="e.g. 100" />
              </div>
            </div>

            <div class="form-group" style="margin-bottom: 16px;">
              <label for="statusSelect">Status</label>
              <select id="statusSelect" class="filter-select full">
                <option value="pending">Pending</option>
                <option value="review">Under Review</option>
                <option value="graded">Graded</option>
              </select>
            </div>

            <div class="form-group" style="margin-bottom: 24px;">
              <label for="feedbackInput">Teacher Feedback</label>
              <textarea id="feedbackInput" rows="4" placeholder="Write detailed feedback for the student…"></textarea>
            </div>

            <div class="modal-actions" style="margin-top: 0;">
              <button class="save-btn" id="saveGradeBtn" style="width: 100%;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13"/><polyline points="7 3 7 8 15 8"/></svg>
                Save Grade & Return
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightboxClose">✕</button>
    <img id="lightboxImg" src="" alt="Full size answer sheet" />
  </div>

  <!-- Toast -->
  <div id="toast" class="toast" role="alert"></div>

  <script src="grade.js"></script>
</body>
</html>
