<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Super Admin Dashboard - Unitest Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Syne:wght@600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="superadmin-dashboard.css" />
</head>

<body>
    <div class="bg-noise" aria-hidden="true"></div>
    <main class="shell">
        <header class="top">
            <div class="title-block">
                <p class="eyebrow">UNITEST CONTROL HUB</p>
                <h1>Super Admin Console</h1>
            </div>
            <p id="welcome">Welcome</p>
        </header>

        <nav class="admin-menu" aria-label="Super Admin Sections">
            <button type="button" class="admin-menu-btn active" data-menu-target="staff" aria-selected="true">Staff &
                Imports</button>
            <button type="button" class="admin-menu-btn" data-menu-target="assignments" aria-selected="false">Teacher
                Assignments</button>
            <button type="button" class="admin-menu-btn" data-menu-target="operations" aria-selected="false">Operations
                & Subjects</button>
            <button type="button" class="admin-menu-btn" data-menu-target="passwords" aria-selected="false">
                <span style="display:inline-flex;align-items:center;gap:6px;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        aria-hidden="true">
                        <rect x="3" y="10" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 10V7a5 5 0 0 1 10 0v3"></path>
                    </svg>
                    Password Management
                </span>
            </button>
        </nav>

        <!-- STAFF PANEL -->
        <section class="menu-panel active" data-panel="staff" id="panel-staff">
            <div class="grid">
                <section class="card">
                    <h2>Manage Staff Accounts</h2>
                    <form id="staffForm" class="form" novalidate>
                        <div class="row">
                            <div class="col">
                                <label for="staffEmail">Username / Email</label>
                                <input id="staffEmail" type="text" placeholder="e.g. shreekesavan" required />
                            </div>
                            <div class="col">
                                <label for="staffName">Full Name</label>
                                <input id="staffName" type="text" placeholder="Staff full name" required />
                            </div>
                        </div>
                        <div class="row">
                            <div class="col">
                                <label for="staffRole">Role</label>
                                <input id="staffRole" type="text" value="Chemistry Teacher" required />
                            </div>
                            <div class="col">
                                <label for="staffPassword">Account Password</label>
                                <input id="staffPassword" type="password" placeholder="Min 6 characters" required />
                            </div>
                        </div>
                        <button class="btn primary" type="submit">Create / Update Staff</button>
                        <p id="staffMsg" class="msg"></p>
                    </form>
                </section>

                <section class="card">
                    <h2>Student Batch Import</h2>
                    <form id="importForm" class="form" novalidate>
                        <label for="stream">Target Department (optional)</label>
                        <input id="stream" type="text" placeholder="e.g. AID" />

                        <label for="importSection">Target Section (required)</label>
                        <input id="importSection" type="text" placeholder="e.g. A7 or A3" required />

                        <label for="studentFile">Select Student Data (.xlsx, .csv) or use manual entries below</label>
                        <div class="file-drop-preview">
                            <input id="studentFile" type="file" accept=".xlsx,.xls,.csv" />
                        </div>

                        <div class="btn-group">
                            <button class="btn ghost" id="downloadTemplateBtn" type="button">Download Template</button>
                            <button class="btn action" type="submit">Upload & Import</button>
                        </div>
                        <p id="importMsg" class="msg"></p>
                    </form>
                </section>

                <section class="card">
                    <h2>Manual Student Entry</h2>
                    <form id="manualImportForm" class="form" novalidate>
                        <div class="row">
                            <div class="col">
                                <label for="manualRegNo">Register Number (required)</label>
                                <input id="manualRegNo" type="text" placeholder="e.g. 927625BAD001" required />
                            </div>
                            <div class="col">
                                <label for="manualPassword">Password (required)</label>
                                <input id="manualPassword" type="password" placeholder="Min 6 characters" required />
                            </div>
                        </div>

                        <label for="manualFullName">Student Name (required)</label>
                        <input id="manualFullName" type="text" placeholder="e.g. Aashiq R" required />

                        <label for="manualStream">Target Department (optional)</label>
                        <input id="manualStream" type="text" placeholder="e.g. AID" />

                        <label for="manualSection">Target Section (required)</label>
                        <input id="manualSection" type="text" placeholder="e.g. A7 or A3" required />

                        <div class="btn-group">
                            <button class="btn action" type="submit">Save Manual Students</button>
                        </div>
                        <p id="manualImportMsg" class="msg"></p>
                    </form>
                </section>

                <section class="card accounts-list-card" style="grid-column: 1 / -1;">
                    <div class="head-row">
                        <h2>Registered Students</h2>
                        <button class="btn ghost" id="refreshStudentsBtn" type="button">Sync Students</button>
                    </div>
                    <div id="studentsList" class="list"></div>
                </section>
            </div>

            <section class="card accounts-list-card">
                <div class="head-row">
                    <h2>Registered Staff Accounts</h2>
                    <button class="btn ghost" id="refreshBtn" type="button">Sync Data</button>
                </div>
                <div id="staffList" class="list"></div>
            </section>
        </section>

        <!-- ASSIGNMENTS PANEL (Populated by JS) -->
        <section class="menu-panel" data-panel="assignments" id="panel-assignments" hidden>
            <div id="assignmentsMount">
                <div class="list-item">
                    <div class="meta">Loading assignments interface...</div>
                </div>
            </div>
        </section>

        <!-- OPERATIONS PANEL (Populated by JS) -->
        <section class="menu-panel" data-panel="operations" id="panel-operations" hidden>
            <div id="operationsMount">
                <div class="list-item">
                    <div class="meta">Loading specialized tools...</div>
                </div>
            </div>
        </section>

        <!-- PASSWORD MANAGEMENT PANEL -->
        <section class="menu-panel" data-panel="passwords" id="panel-passwords" hidden>
            <div id="passwordsMount">
                <div class="list-item">
                    <div class="meta">Loading password management...</div>
                </div>
            </div>
        </section>

        <section class="footer-actions">
            <button id="logoutBtn" class="logout-btn" type="button">Logout System</button>
        </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="superadmin-dashboard.js?v=20260404c"></script>
</body>

</html>
