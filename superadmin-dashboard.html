<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Super Admin Dashboard - ChemTest Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Syne:wght@600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="superadmin-dashboard.css" />
</head>

<body>
    <div class="bg-noise" aria-hidden="true"></div>
    <main class="shell">
        <header class="top">
            <div class="title-block">
                <p class="eyebrow">CHEMTEST CONTROL HUB</p>
                <h1>Super Admin Console</h1>
            </div>
            <p id="welcome">Welcome</p>
        </header>

        <div class="grid">
            <section class="card">
                <h2>Create / Update Staff</h2>
                <form id="staffForm" class="form" novalidate>
                    <label for="staffEmail">Username</label>
                    <input id="staffEmail" type="text" placeholder="e.g. shreekesavan" required />

                    <label for="staffName">Full Name</label>
                    <input id="staffName" type="text" placeholder="Staff full name" required />

                    <label for="staffRole">Role</label>
                    <input id="staffRole" type="text" value="Chemistry Teacher" required />

                    <label for="staffPassword">Password</label>
                    <input id="staffPassword" type="text" placeholder="Min 6 characters" required />

                    <button class="btn primary" type="submit">Save Staff Account</button>
                    <p id="staffMsg" class="msg"></p>
                </form>
            </section>

            <section class="card">
                <h2>Import Students via Excel</h2>
                <form id="importForm" class="form" novalidate>
                    <label for="stream">Default Stream (optional)</label>
                    <input id="stream" type="text" placeholder="e.g. CSE-A" />

                    <label for="studentFile">Excel File (.xlsx/.xls/.csv)</label>
                    <input id="studentFile" type="file" accept=".xlsx,.xls,.csv" required />

                    <button class="btn" type="submit">Upload & Import Students</button>
                    <p id="importMsg" class="msg"></p>
                </form>
            </section>
        </div>

        <section class="card">
            <div class="head-row">
                <h2>Staff Accounts</h2>
                <button class="btn ghost" id="refreshBtn" type="button">Refresh</button>
            </div>
            <div id="staffList" class="list"></div>
        </section>

        <section class="card actions-card">
            <a class="btn nav" href="staff-dashboard.html">Open Staff Dashboard</a>
            <a class="btn nav" href="grade.html">Open Grading Console</a>
            <button id="logoutBtn" class="logout" type="button">Logout Securely</button>
        </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="superadmin-dashboard.js"></script>
</body>

</html>
