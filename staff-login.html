<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff Login – ChemTest Portal</title>
  <meta name="description" content="Staff secure login to manage and mark student home test submissions." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="staff-login.css" />
</head>
<body>
  <canvas id="bgCanvas"></canvas>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <a href="index.html" class="back-link">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
    Student Portal
  </a>

  <div class="login-wrap">
    <div class="login-card">
      <!-- Glow ring -->
      <div class="glow-ring"></div>

      <div class="login-header">
        <div class="logo-wrap">
          <span class="logo-emoji">⚗️</span>
          <div class="logo-rings"></div>
        </div>
        <h1 class="login-title">Staff Portal</h1>
        <p class="login-sub">Sign in to manage student submissions</p>
      </div>

      <div class="demo-hint">
        <span class="hint-label">Default Credentials</span>
        <span>shreekesavan · Password: Kesavan@123</span>
      </div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Username or Email</label>
          <div class="input-wrap">
            <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            <input type="text" id="email" placeholder="shreekesavan" autocomplete="username" required />
          </div>
          <span class="err" id="emailErr"></span>
        </div>

        <div class="form-group">
          <label for="password">
            Password
            <button type="button" class="forgot-btn" id="forgotBtn">Forgot?</button>
          </label>
          <div class="input-wrap">
            <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />
            <button type="button" class="toggle-pw" id="togglePw" tabindex="-1">
              <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <span class="err" id="pwErr"></span>
        </div>

        <div class="form-options">
          <label class="remember-label">
            <input type="checkbox" id="remember" />
            <span class="custom-check"></span>
            Remember me
          </label>
        </div>

        <button type="submit" class="login-btn" id="loginBtn">
          <span class="btn-text">Sign In</span>
          <span class="btn-loader" hidden><span class="spinner"></span> Verifying…</span>
        </button>
      </form>

      <div class="login-footer">
        <p>Access restricted to authorised staff only</p>
      </div>
    </div>
  </div>

  <div id="toast" class="toast" role="alert"></div>

  <script src="staff-login.js"></script>
</body>
</html>
