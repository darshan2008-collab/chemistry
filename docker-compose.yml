services:
  chemtest-init:
    image: alpine:3.20
    container_name: chemtest-init
    restart: unless-stopped
    command: >
      sh -c "
      mkdir -p /project/data/nginx/logs /project/data/nginx/cache &&
      chmod -R 755 /project/data &&
      tail -f /dev/null
      "
    volumes:
      - type: bind
        source: ${PROJECT_ROOT}
        target: /project
    healthcheck:
      test: ["CMD-SHELL", "test -d /project/data/nginx/logs -a -d /project/data/nginx/cache"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - chemistry-net

  chemtest-web:
    image: nginx:1.27-alpine
    container_name: chemtest-web
    restart: unless-stopped
    depends_on:
      chemtest-init:
        condition: service_healthy
    ports:
      - "${APP_PORT}:80"
    expose:
      - "80"
    environment:
      TZ: ${TZ}
      APP_ENV: ${APP_ENV}
      APP_PORT: ${APP_PORT}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_SSLMODE: ${DB_SSLMODE}
    volumes:
      - type: bind
        source: ${PROJECT_ROOT}
        target: /usr/share/nginx/html
        read_only: true
      - type: bind
        source: ${PROJECT_ROOT}/data/nginx/logs
        target: /var/log/nginx
      - type: bind
        source: ${PROJECT_ROOT}/data/nginx/cache
        target: /var/cache/nginx
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:80 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - chemistry-net

networks:
  chemistry-net:
    name: ${STACK_NETWORK}
    driver: bridge
