services:
  chemtest-db:
    image: postgres:16-alpine
    container_name: chemtest-db
    restart: unless-stopped
    environment:
      TZ: ${TZ}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - type: bind
        source: ${POSTGRES_ROOT}
        target: /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME} -h 127.0.0.1 -p 5432 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 8
      start_period: 15s
    networks:
      - chemistry-net

  chemtest-api:
    image: chemtest-api:local
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: chemtest-api
    restart: unless-stopped
    depends_on:
      chemtest-db:
        condition: service_healthy
    environment:
      TZ: ${TZ}
      API_PORT: ${API_PORT}
      UPLOAD_DIR: /data/uploads
      STUDENTS_FILE: /app/students-db.js
      STUDENTS_SYNC_ON_STARTUP: ${STUDENTS_SYNC_ON_STARTUP:-false}
      BASELINE_ASSIGNMENTS_ON_STARTUP: ${BASELINE_ASSIGNMENTS_ON_STARTUP:-false}
      UHV_ASSIGNMENTS_ON_STARTUP: ${UHV_ASSIGNMENTS_ON_STARTUP:-false}
      RESYNC_TOKEN: ${RESYNC_TOKEN}
      AUTH_PEPPER: ${AUTH_PEPPER}
      AUTH_SESSION_TTL_HOURS: ${AUTH_SESSION_TTL_HOURS}
      STAFF_DEFAULT_EMAIL: ${STAFF_DEFAULT_EMAIL}
      STAFF_DEFAULT_PASSWORD: ${STAFF_DEFAULT_PASSWORD}
      STAFF_DEFAULT_NAME: ${STAFF_DEFAULT_NAME}
      STAFF_DEFAULT_ROLE: ${STAFF_DEFAULT_ROLE}
      UHV_STAFF_EMAIL: ${UHV_STAFF_EMAIL}
      UHV_STAFF_PASSWORD: ${UHV_STAFF_PASSWORD}
      UHV_STAFF_NAME: ${UHV_STAFF_NAME}
      UHV_STAFF_ROLE: ${UHV_STAFF_ROLE}
      SUPERADMIN_DEFAULT_EMAIL: ${SUPERADMIN_DEFAULT_EMAIL}
      SUPERADMIN_DEFAULT_PASSWORD: ${SUPERADMIN_DEFAULT_PASSWORD}
      SUPERADMIN_DEFAULT_NAME: ${SUPERADMIN_DEFAULT_NAME}
      SUPERADMIN_DEFAULT_ROLE: ${SUPERADMIN_DEFAULT_ROLE}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - type: bind
        source: ${UPLOADS_ROOT}
        target: /data/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:${API_PORT}/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - chemistry-net

  chemtest-cleanup:
    image: alpine:3.20
    container_name: chemtest-cleanup
    restart: unless-stopped
    command: >
      sh -c "
      echo \"${CLEANUP_SCHEDULE} find /data/uploads -type f -mtime +${RETENTION_DAYS} -print -delete >/proc/1/fd/1 2>/proc/1/fd/2\" > /etc/crontabs/root &&
      crond -f -l 8
      "
    environment:
      TZ: ${TZ}
      RETENTION_DAYS: ${RETENTION_DAYS}
      CLEANUP_SCHEDULE: ${CLEANUP_SCHEDULE}
    volumes:
      - type: bind
        source: ${UPLOADS_ROOT}
        target: /data/uploads
    healthcheck:
      test: ["CMD-SHELL", "pgrep crond >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - chemistry-net

  chemtest-web:
    image: chemtest-web:local
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: chemtest-web
    restart: unless-stopped
    depends_on:
      chemtest-api:
        condition: service_healthy
    ports:
      - "${APP_PORT}:80"
    expose:
      - "80"
    environment:
      TZ: ${TZ}
      APP_ENV: ${APP_ENV}
      APP_PORT: ${APP_PORT}
    volumes:
      - type: bind
        source: ${UPLOADS_ROOT}
        target: /data/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:80 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - chemistry-net

networks:
  chemistry-net:
    name: ${STACK_NETWORK}
    driver: bridge
