services:
  chemtest-init:
    image: alpine:3.20
    container_name: chemtest-init
    restart: unless-stopped
    command: >
      sh -c "
      mkdir -p /project/data/nginx/logs /project/data/nginx/cache /project/data/uploads /project/data/postgres &&
      chmod -R 755 /project/data &&
      tail -f /dev/null
      "
    volumes:
      - type: bind
        source: ${PROJECT_ROOT}
        target: /project
    healthcheck:
      test: ["CMD-SHELL", "test -d /project/data/nginx/logs -a -d /project/data/nginx/cache"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - chemistry-net

  chemtest-db:
    image: postgres:16-alpine
    container_name: chemtest-db
    restart: unless-stopped
    depends_on:
      chemtest-init:
        condition: service_healthy
    environment:
      TZ: ${TZ}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - type: bind
        source: ${PROJECT_ROOT}/data/postgres
        target: /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME} -h 127.0.0.1 -p 5432 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 8
      start_period: 15s
    networks:
      - chemistry-net

  chemtest-api:
    image: node:20-alpine
    container_name: chemtest-api
    restart: unless-stopped
    depends_on:
      chemtest-init:
        condition: service_healthy
      chemtest-db:
        condition: service_healthy
    working_dir: /app
    command: >
      sh -c "
      test -f /app/package.json || (echo 'ERROR: /app/package.json not found. Check PROJECT_ROOT and bind mount for ${PROJECT_ROOT}/api -> /app.' && exit 1) &&
      npm install --omit=dev &&
      npm start
      "
    environment:
      TZ: ${TZ}
      API_PORT: ${API_PORT}
      UPLOAD_DIR: /data/uploads
      STUDENTS_FILE: /app/students-db.js
      RESYNC_TOKEN: ${RESYNC_TOKEN}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - type: bind
        source: ${PROJECT_ROOT}/api
        target: /app
      - type: bind
        source: ${PROJECT_ROOT}/students-db.js
        target: /app/students-db.js
        read_only: true
      - type: bind
        source: ${PROJECT_ROOT}/data/uploads
        target: /data/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:${API_PORT}/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - chemistry-net

  chemtest-cleanup:
    image: alpine:3.20
    container_name: chemtest-cleanup
    restart: unless-stopped
    depends_on:
      chemtest-init:
        condition: service_healthy
    command: >
      sh -c "
      echo \"${CLEANUP_SCHEDULE} find /data/uploads -type f -mtime +${RETENTION_DAYS} -print -delete >/proc/1/fd/1 2>/proc/1/fd/2\" > /etc/crontabs/root &&
      crond -f -l 8
      "
    environment:
      TZ: ${TZ}
      RETENTION_DAYS: ${RETENTION_DAYS}
      CLEANUP_SCHEDULE: ${CLEANUP_SCHEDULE}
    volumes:
      - type: bind
        source: ${PROJECT_ROOT}/data/uploads
        target: /data/uploads
    healthcheck:
      test: ["CMD-SHELL", "pgrep crond >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - chemistry-net

  chemtest-web:
    image: nginx:1.27-alpine
    container_name: chemtest-web
    restart: unless-stopped
    depends_on:
      chemtest-init:
        condition: service_healthy
      chemtest-api:
        condition: service_healthy
    ports:
      - "${APP_PORT}:80"
    expose:
      - "80"
    environment:
      TZ: ${TZ}
      APP_ENV: ${APP_ENV}
      APP_PORT: ${APP_PORT}
    volumes:
      - type: bind
        source: ${PROJECT_ROOT}
        target: /usr/share/nginx/html
        read_only: true
      - type: bind
        source: ${PROJECT_ROOT}/nginx/default.conf
        target: /etc/nginx/conf.d/default.conf
        read_only: true
      - type: bind
        source: ${PROJECT_ROOT}/data/nginx/logs
        target: /var/log/nginx
      - type: bind
        source: ${PROJECT_ROOT}/data/nginx/cache
        target: /var/cache/nginx
      - type: bind
        source: ${PROJECT_ROOT}/data/uploads
        target: /data/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:80 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - chemistry-net

networks:
  chemistry-net:
    name: ${STACK_NETWORK}
    driver: bridge
